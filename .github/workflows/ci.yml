name: .NET CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - name: Restore dependencies
        run: dotnet restore CyberBot/Cybersecurity_Chatbot.sln

      - name: Build
        run: dotnet build CyberBot/Cybersecurity_Chatbot.sln --configuration Release --no-restore

      - name: Test
        run: dotnet test CyberBot/Cybersecurity_Chatbot.sln --configuration Release --no-build --verbosity normal
